<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- ThruShield palette: teal-400 / teal-500 / teal-700 on slate-950 surfaces -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="glyphGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Body background from src/popup/index.css (#0b1220) -->
  <rect width="100%" height="100%" rx="110" fill="#0b1220" />
  <g opacity="0.08" stroke="#2dd4bf" stroke-width="1.5" fill="none">
    <circle cx="256" cy="256" r="220" stroke-dasharray="12, 12" />
    <circle cx="256" cy="256" r="170" stroke-dasharray="6, 6" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="0" y1="256" x2="512" y2="256" />
  </g>
  <path d="M 256 80 L 390 120 C 390 280 300 390 256 432 C 212 390 122 280 122 120 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="14" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Panel fill: Tailwind slate-950 (#020617) -->
  <path d="M 256 102 L 368 132 C 368 252 294 352 256 392 C 218 352 144 252 144 132 Z" fill="#020617" stroke="url(#shieldGrad)" stroke-width="4" stroke-linejoin="round" />
  <path d="M 195 180 L 295 180 L 335 215 L 295 250 L 276 250 L 276 320 L 236 320 L 236 250 L 195 250 Z" fill="url(#glyphGrad)" stroke="url(#shieldGrad)" stroke-width="1.5" stroke-linejoin="round" filter="url(#glow)" />
</svg>
